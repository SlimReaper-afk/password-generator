<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Senhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0F1319;
      --surface: #171C26;
      --surface-2: #1E2532;
      --border: #2A3342;
      --ink: #EAEEF5;
      --muted: #8B95A7;
      --accent: #6AA0FF;
      --accent-strong: #3F7DFB;
      --weak: #F0616D;
      --ok: #F2C14E;
      --strong: #43C59E;
      --excellent: #6AA0FF;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(106,160,255,0.10), transparent 60%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,0.8);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 8px 0 24px;
    }
    h1 span { color: var(--accent); }

    /* ---- Password display (the hero) ---- */
    .output {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px 18px 20px;
    }
    .password {
      flex: 1;
      font-family: var(--mono);
      font-weight: 700;
      font-size: clamp(16px, 4.4vw, 22px);
      letter-spacing: 0.02em;
      word-break: break-all;
      line-height: 1.35;
      min-height: 1.35em;
      user-select: all;
    }
    .password .filled { color: var(--ink); }
    .password.scrambling { color: var(--accent); opacity: 0.9; }

    .copy-btn {
      flex-shrink: 0;
      align-self: flex-start;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { color: var(--ink); border-color: var(--accent); }
    .copy-btn.done { color: var(--strong); border-color: var(--strong); }

    /* ---- Strength meter ---- */
    .meter {
      margin: 16px 0 26px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meter-track {
      flex: 1;
      height: 6px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--accent);
      transition: width .35s ease, background .35s ease;
    }
    .meter-label {
      font-size: 12.5px;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .meter-label b { color: var(--ink); font-weight: 600; }

    /* ---- Controls ---- */
    .control { margin-bottom: 22px; }
    .control-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .control-head label { font-size: 14px; font-weight: 500; color: var(--ink); }
    .len-value {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--surface-2);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--surface);
      cursor: pointer;
      box-shadow: 0 0 0 1px var(--border);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; border: 3px solid var(--surface);
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    .toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
    .toggle:hover { border-color: #38455a; }
    .toggle input { position: absolute; opacity: 0; pointer-events: none; }
    .box {
      width: 18px; height: 18px; border-radius: 6px;
      border: 1.5px solid var(--muted);
      display: grid; place-items: center;
      transition: background .15s, border-color .15s;
    }
    .box::after {
      content: "";
      width: 10px; height: 10px;
      border-radius: 3px;
      background: var(--accent);
      transform: scale(0);
      transition: transform .15s;
    }
    .toggle input:checked + .box { border-color: var(--accent); }
    .toggle input:checked + .box::after { transform: scale(1); }
    .toggle input:focus-visible + .box { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---- Generate button ---- */
    .generate {
      width: 100%;
      margin-top: 26px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #0A0F17;
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    .generate:hover { background: var(--accent-strong); color: #fff; }
    .generate:active { transform: translateY(1px); }
    .generate:disabled { opacity: 0.45; cursor: not-allowed; }

    .error {
      color: var(--weak);
      font-size: 13px;
      margin-top: 12px;
      min-height: 16px;
    }

    .foot {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .foot code {
      font-family: var(--mono);
      color: var(--ink);
      background: var(--surface-2);
      padding: 1px 6px;
      border-radius: 5px;
      font-size: 11.5px;
    }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Gerador de senhas</p>
    <h1>Crie uma senha <span>forte</span> em um clique</h1>

    <div class="output">
      <div class="password" id="password" aria-live="polite">clique em gerar</div>
      <button class="copy-btn" id="copy" type="button">Copiar</button>
    </div>

    <div class="meter" aria-hidden="true">
      <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
      <div class="meter-label" id="meterLabel">—</div>
    </div>

    <div class="control">
      <div class="control-head">
        <label for="length">Tamanho</label>
        <span class="len-value" id="lenValue">20</span>
      </div>
      <input type="range" id="length" min="{{ min_length }}" max="64" value="20" />
    </div>

    <div class="control">
      <div class="toggles">
        <label class="toggle"><input type="checkbox" id="use_upper" checked /><span class="box"></span>Maiúsculas</label>
        <label class="toggle"><input type="checkbox" id="use_lower" checked /><span class="box"></span>Minúsculas</label>
        <label class="toggle"><input type="checkbox" id="use_digits" checked /><span class="box"></span>Números</label>
        <label class="toggle"><input type="checkbox" id="use_symbols" checked /><span class="box"></span>Símbolos</label>
      </div>
    </div>

    <button class="generate" id="generate" type="button">Gerar senha</button>
    <p class="error" id="error" role="alert"></p>

    <div class="foot">
      <span>Aleatoriedade gerada pelo módulo</span> <code>secrets</code> <span>do Python.</span>
    </div>
  </main>

  <script>
    const MIN = {{ min_length }};
    const GLYPHS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

    const el = {
      password: document.getElementById("password"),
      copy: document.getElementById("copy"),
      meterFill: document.getElementById("meterFill"),
      meterLabel: document.getElementById("meterLabel"),
      length: document.getElementById("length"),
      lenValue: document.getElementById("lenValue"),
      generate: document.getElementById("generate"),
      error: document.getElementById("error"),
      upper: document.getElementById("use_upper"),
      lower: document.getElementById("use_lower"),
      digits: document.getElementById("use_digits"),
      symbols: document.getElementById("use_symbols"),
    };

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let currentPassword = "";

    function options() {
      return {
        length: parseInt(el.length.value, 10),
        use_upper: el.upper.checked,
        use_lower: el.lower.checked,
        use_digits: el.digits.checked,
        use_symbols: el.symbols.checked,
      };
    }

    function poolSize(o) {
      return (o.use_lower ? 26 : 0) + (o.use_upper ? 26 : 0)
           + (o.use_digits ? 10 : 0) + (o.use_symbols ? 32 : 0);
    }

    function classify(bits) {
      if (bits < 50) return { label: "Fraca", color: "var(--weak)", pct: 25 };
      if (bits < 80) return { label: "Boa", color: "var(--ok)", pct: 55 };
      if (bits < 120) return { label: "Forte", color: "var(--strong)", pct: 80 };
      return { label: "Excelente", color: "var(--excellent)", pct: 100 };
    }

    function anyTypeSelected(o) {
      return o.use_lower || o.use_upper || o.use_digits || o.use_symbols;
    }

    function updateMeter() {
      const o = options();
      el.lenValue.textContent = o.length;
      const size = poolSize(o);
      if (size === 0) {
        el.meterFill.style.width = "0%";
        el.meterLabel.textContent = "—";
        el.generate.disabled = true;
        el.error.textContent = "Selecione ao menos um tipo de caractere.";
        return;
      }
      el.generate.disabled = false;
      if (!currentPassword) el.error.textContent = "";
      const bits = Math.round(o.length * Math.log2(size) * 10) / 10;
      const c = classify(bits);
      el.meterFill.style.width = c.pct + "%";
      el.meterFill.style.background = c.color;
      el.meterLabel.innerHTML = `${Math.round(bits)} bits · <b>${c.label}</b>`;
    }

    function scrambleTo(finalText) {
      if (reduceMotion) { el.password.textContent = finalText; return; }
      el.password.classList.add("scrambling");
      const frames = 12;
      let frame = 0;
      const timer = setInterval(() => {
        frame++;
        const revealed = Math.floor((frame / frames) * finalText.length);
        let out = "";
        for (let i = 0; i < finalText.length; i++) {
          out += i < revealed ? finalText[i] : GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        }
        el.password.textContent = out;
        if (frame >= frames) {
          clearInterval(timer);
          el.password.textContent = finalText;
          el.password.classList.remove("scrambling");
        }
      }, 28);
    }

    async function generate() {
      el.error.textContent = "";
      el.generate.disabled = true;
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(options()),
        });
        const data = await res.json();
        if (!res.ok) {
          el.error.textContent = data.error || "Não foi possível gerar a senha.";
          return;
        }
        currentPassword = data.password;
        scrambleTo(data.password);
        const c = classify(data.entropy_bits);
        el.meterFill.style.width = c.pct + "%";
        el.meterFill.style.background = c.color;
        el.meterLabel.innerHTML = `${Math.round(data.entropy_bits)} bits · <b>${data.strength}</b>`;
      } catch (err) {
        el.error.textContent = "Falha na conexão com o servidor.";
      } finally {
        el.generate.disabled = false;
      }
    }

    async function copyPassword() {
      if (!currentPassword) return;
      try {
        await navigator.clipboard.writeText(currentPassword);
      } catch (err) {
        const tmp = document.createElement("textarea");
        tmp.value = currentPassword;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        document.body.removeChild(tmp);
      }
      el.copy.textContent = "Copiado!";
      el.copy.classList.add("done");
      setTimeout(() => {
        el.copy.textContent = "Copiar";
        el.copy.classList.remove("done");
      }, 1600);
    }

    el.generate.addEventListener("click", generate);
    el.copy.addEventListener("click", copyPassword);
    el.password.addEventListener("click", copyPassword);
    [el.length, el.upper, el.lower, el.digits, el.symbols].forEach((c) =>
      c.addEventListener("input", updateMeter)
    );

    updateMeter();
    generate();
  </script>
</body>
</html>
